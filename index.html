<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sliding Puzzle · Compact + Timer</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(145deg, #1a2a2f 0%, #0e1a1f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      margin: 0;
      padding: 16px;
    }

    /* ukuran container lebih kecil */
    .game-container {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      padding: 10px 14px 18px;
      box-shadow: 0 18px 28px rgba(0, 0, 0, 0.5);
    }

    .puzzle-wrapper {
      background-color: #8b3c2c;
      border-radius: 24px;
      padding: 8px;
      box-shadow: inset 0 0 0 2px #e2b87a, 0 12px 20px rgba(0, 0, 0, 0.3);
    }

    /* grid lebih rapat */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      background-color: #7a2e1f;
      border-radius: 18px;
      padding: 4px;
    }

    /* tile lebih kecil */
    .tile {
      aspect-ratio: 1 / 1;
      background: #ffa559;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.2rem, 5vw, 2rem);
      font-weight: 800;
      color: #2d1b0c;
      font-family: 'Fira Sans', monospace;
      transition: all 0.12s ease;
      cursor: default;
      box-shadow: 0 4px 0 #a4511c;
      transform: translateY(-1px);
      text-shadow: 1px 1px 0 rgba(255,215,150,0.8);
    }

    .tile.empty {
      background: #c7bc9c;
      box-shadow: inset 0 0 0 2px #e7ddbc, 0 2px 5px rgba(0,0,0,0.1);
      transform: none;
      color: transparent;
      text-shadow: none;
    }

    .tile.movable {
      cursor: pointer;
      background: #ffb347;
      box-shadow: 0 2px 0 #a4511c;
      transform: translateY(1px);
    }

    .tile.movable:hover {
      background: #fff5e0;
      color: #c25d00;
      transform: scale(0.96) translateY(2px);
      box-shadow: 0 1px 0 #9b4a1a;
    }

    /* panel info lebih ramping */
    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      margin-bottom: 4px;
      padding: 0 6px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stats {
      background: #1f2c2b;
      padding: 3px 14px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 2px #3d5a55, 0 4px 8px black;
      display: flex;
      gap: 16px;
    }

    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #ffda9e;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: bold;
      background: #00000066;
      padding: 1px 8px;
      border-radius: 1.5rem;
      color: #d9ffb8;
      font-family: monospace;
    }

    .game-status {
      font-size: 1rem;
      font-weight: 800;
      background: #000000aa;
      padding: 3px 14px;
      border-radius: 32px;
      backdrop-filter: blur(6px);
      color: #ffeb99;
      letter-spacing: 0.5px;
    }

    button {
      background: #f5b642;
      border: none;
      font-size: 0.85rem;
      font-weight: bold;
      padding: 4px 16px;
      border-radius: 32px;
      font-family: inherit;
      cursor: pointer;
      color: #2d2418;
      transition: all 0.1s;
      box-shadow: 0 3px 0 #8b4513;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #8b4513;
    }

    .hint {
      text-align: center;
      margin-top: 12px;
      color: #e7cca5;
      font-weight: 500;
      font-size: 0.65rem;
      background: #1e2a26a0;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 3px 12px;
      border-radius: 30px;
    }

    /* Modal selamat - teks statistik putih */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-card {
      background: linear-gradient(135deg, #2b2e2a, #1e2a1f);
      border-radius: 40px;
      padding: 20px 24px;
      text-align: center;
      max-width: 280px;
      width: 80%;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
      border: 1px solid #ffd966;
    }
    .modal-card h2 {
      font-size: 1.6rem;
      margin: 0 0 10px;
      color: #ffd966;
    }
    .modal-card p {
      font-size: 0.9rem;
      margin: 6px 0;
      color: #f7f3cf;
    }
    .modal-stats {
      background: #00000055;
      padding: 8px;
      border-radius: 32px;
      margin: 14px 0;
      font-weight: bold;
      color: white; /* putih */
    }
    .modal-stats strong {
      color: white;
    }
    .close-modal {
      background: #ffb347;
      border: none;
      font-size: 0.85rem;
      font-weight: bold;
      padding: 5px 18px;
      border-radius: 28px;
      cursor: pointer;
      margin-top: 6px;
    }

    @media (max-width: 480px) {
      .board { gap: 3px; padding: 3px; }
      .puzzle-wrapper { padding: 6px; }
      .tile { border-radius: 10px; font-size: 1.2rem; }
      .stats { padding: 2px 10px; gap: 10px; }
      .stat-value { font-size: 0.9rem; padding: 0px 6px; }
      .game-status { font-size: 0.85rem; padding: 2px 10px; }
      button { font-size: 0.75rem; padding: 3px 12px; }
      .modal-card h2 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="puzzle-wrapper">
    <div class="board" id="puzzleBoard"></div>
  </div>

  <div class="info-panel">
    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">🏆 LANGKAH</span>
        <span class="stat-value" id="moveCounter">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">⏱️ WAKTU</span>
        <span class="stat-value" id="timerDisplay">00:00</span>
      </div>
    </div>
    <div class="game-status" id="gameStatusMsg">⚡ MAIN</div>
    <button id="newGameBtn">🔄 BARU</button>
  </div>
  <div class="hint">
    ✨ klik ubin yang bersebelahan dengan ruang kosong · susun 1..8
  </div>
</div>

<!-- Modal ucapan selamat dengan teks putih -->
<div id="winModal" class="modal">
  <div class="modal-card">
    <h2>🎉 SELAMAT! 🎉</h2>
    <p>Anda menyelesaikan puzzle!</p>
    <div class="modal-stats">
      📊 <strong id="finalMoves">0</strong> langkah &nbsp;|&nbsp; ⏱️ <strong id="finalTime">00:00</strong>
    </div>
    <button class="close-modal" id="closeModalBtn">Tutup</button>
  </div>
</div>

<script>
  // ---------- 3x3 SLIDING PUZZLE ----------
  const SIZE = 3;
  const SOLVED_STATE = [
    [1, 2, 3],
    [4, 5, 6],
    [7, 8, ""]
  ];

  let board = [];
  let emptyRow = 2;
  let emptyCol = 2;
  let moveCount = 0;
  let gameActive = true;
  let winFlag = false;

  // Timer variables
  let timerInterval = null;
  let timerSeconds = 0;
  let timerStarted = false;

  // DOM elements
  const boardContainer = document.getElementById("puzzleBoard");
  const moveCounterSpan = document.getElementById("moveCounter");
  const timerDisplaySpan = document.getElementById("timerDisplay");
  const gameStatusSpan = document.getElementById("gameStatusMsg");
  const winModal = document.getElementById("winModal");
  const finalMovesSpan = document.getElementById("finalMoves");
  const finalTimeSpan = document.getElementById("finalTime");

  function formatTime(sec) {
    const mins = Math.floor(sec / 60);
    const remainSec = sec % 60;
    return `${mins.toString().padStart(2, '0')}:${remainSec.toString().padStart(2, '0')}`;
  }

  function updateTimerUI() {
    timerDisplaySpan.textContent = formatTime(timerSeconds);
  }

  function startTimer() {
    if (timerStarted) return;
    timerStarted = true;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (gameActive && !winFlag && timerStarted) {
        timerSeconds++;
        updateTimerUI();
      }
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function resetTimer() {
    stopTimer();
    timerSeconds = 0;
    timerStarted = false;
    updateTimerUI();
  }

  function getSolvedBoardCopy() {
    return SOLVED_STATE.map(row => [...row]);
  }

  function updateEmptyCoordinates() {
    for (let i = 0; i < SIZE; i++) {
      for (let j = 0; j < SIZE; j++) {
        if (board[i][j] === "") {
          emptyRow = i;
          emptyCol = j;
          return;
        }
      }
    }
  }

  function isGameWon() {
    for (let i = 0; i < SIZE; i++) {
      for (let j = 0; j < SIZE; j++) {
        if (board[i][j] !== SOLVED_STATE[i][j]) return false;
      }
    }
    return true;
  }

  function showWinModal() {
    finalMovesSpan.textContent = moveCount;
    finalTimeSpan.textContent = formatTime(timerSeconds);
    winModal.classList.add("active");
  }

  function handleWin() {
    if (!gameActive || winFlag) return;
    gameActive = false;
    winFlag = true;
    stopTimer();
    gameStatusSpan.innerHTML = "🏆 MENANG! 🎉";
    gameStatusSpan.style.color = "#ffec80";
    showWinModal();
    renderBoard();
  }

  function renderBoard() {
    boardContainer.innerHTML = "";
    for (let i = 0; i < SIZE; i++) {
      for (let j = 0; j < SIZE; j++) {
        const value = board[i][j];
        const isEmpty = (value === "");
        const tileDiv = document.createElement("div");
        tileDiv.classList.add("tile");
        if (isEmpty) {
          tileDiv.classList.add("empty");
          tileDiv.textContent = "";
        } else {
          tileDiv.textContent = value;
        }
        tileDiv.setAttribute("data-row", i);
        tileDiv.setAttribute("data-col", j);
        
        if (gameActive && !isEmpty && !winFlag) {
          const isAdjacent = (Math.abs(i - emptyRow) + Math.abs(j - emptyCol)) === 1;
          if (isAdjacent) tileDiv.classList.add("movable");
        }
        boardContainer.appendChild(tileDiv);
      }
    }
    moveCounterSpan.textContent = moveCount;
    if (!winFlag && gameActive) {
      gameStatusSpan.innerHTML = "🎲 BERMAIN";
      gameStatusSpan.style.color = "#ffeb99";
    } else if (winFlag) {
      gameStatusSpan.innerHTML = "🏆 MENANG! 🎉";
    }
  }

  function swapWithEmpty(row, col) {
    const isAdjacent = (Math.abs(row - emptyRow) + Math.abs(col - emptyCol)) === 1;
    if (!isAdjacent) return false;
    if (board[row][col] === "") return false;
    
    const temp = board[row][col];
    board[row][col] = board[emptyRow][emptyCol];
    board[emptyRow][emptyCol] = temp;
    emptyRow = row;
    emptyCol = col;
    return true;
  }

  function attemptMove(row, col) {
    if (!gameActive || winFlag) return false;
    if (board[row][col] === "") return false;
    const isAdjacent = (Math.abs(row - emptyRow) + Math.abs(col - emptyCol)) === 1;
    if (!isAdjacent) return false;
    
    // mulai timer saat gerakan pertama
    if (!timerStarted && !winFlag && gameActive) {
      startTimer();
    }
    
    if (swapWithEmpty(row, col)) {
      moveCount++;
      renderBoard();
      if (isGameWon()) {
        handleWin();
        renderBoard();
      }
      return true;
    }
    return false;
  }

  function performRandomMove() {
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    const neighbors = [];
    for (const [dr, dc] of dirs) {
      const nr = emptyRow + dr, nc = emptyCol + dc;
      if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] !== "") {
        neighbors.push([nr, nc]);
      }
    }
    if (neighbors.length === 0) return false;
    const [randRow, randCol] = neighbors[Math.floor(Math.random() * neighbors.length)];
    const temp = board[randRow][randCol];
    board[randRow][randCol] = board[emptyRow][emptyCol];
    board[emptyRow][emptyCol] = temp;
    emptyRow = randRow;
    emptyCol = randCol;
    return true;
  }

  function shuffleBoardFromSolved(moves = 180) {
    board = getSolvedBoardCopy();
    updateEmptyCoordinates();
    for (let i = 0; i < moves; i++) {
      performRandomMove();
    }
    gameActive = true;
    winFlag = false;
    moveCount = 0;
    resetTimer();        // timer direset, belum berjalan
    timerStarted = false;
    gameStatusSpan.innerHTML = "🎲 BERMAIN";
    gameStatusSpan.style.color = "#ffeb99";
    renderBoard();
  }

  function newGame() {
    winModal.classList.remove("active");
    shuffleBoardFromSolved(200);
  }

  function handleTileClick(e) {
    const target = e.target.closest(".tile");
    if (!target) return;
    if (!gameActive || winFlag) return;
    const row = parseInt(target.getAttribute("data-row"));
    const col = parseInt(target.getAttribute("data-col"));
    if (isNaN(row) || isNaN(col)) return;
    if (board[row][col] === "") return;
    attemptMove(row, col);
  }

  function closeModal() {
    winModal.classList.remove("active");
  }

  boardContainer.addEventListener("click", handleTileClick);
  document.getElementById("newGameBtn").addEventListener("click", () => newGame());
  document.getElementById("closeModalBtn").addEventListener("click", closeModal);
  winModal.addEventListener("click", (e) => {
    if (e.target === winModal) closeModal();
  });

  shuffleBoardFromSolved(190);
</script>
</body>
</html>
