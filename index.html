<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sliding Puzzle · compact</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(145deg, #1a2a2f 0%, #0e1a1f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      margin: 0;
      padding: 16px;
    }

    /* smaller game card */
    .game-container {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
      border-radius: 42px;
      padding: 14px 18px 24px;
      box-shadow: 0 18px 28px rgba(0, 0, 0, 0.5);
    }

    .puzzle-wrapper {
      background-color: #8b3c2c;
      border-radius: 32px;
      padding: 12px;
      box-shadow: inset 0 0 0 2px #e2b87a, 0 12px 20px rgba(0, 0, 0, 0.3);
    }

    /* tighter grid */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      background-color: #7a2e1f;
      border-radius: 24px;
      padding: 6px;
    }

    /* compact tiles */
    .tile {
      aspect-ratio: 1 / 1;
      background: #ffa559;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.6rem, 7vw, 2.8rem);
      font-weight: 800;
      color: #2d1b0c;
      font-family: 'Fira Sans', monospace;
      transition: all 0.12s ease;
      cursor: default;
      box-shadow: 0 5px 0 #a4511c;
      transform: translateY(-1px);
      text-shadow: 1px 1px 0 rgba(255,215,150,0.8);
    }

    .tile.empty {
      background: #c7bc9c;
      box-shadow: inset 0 0 0 2px #e7ddbc, 0 3px 6px rgba(0,0,0,0.1);
      transform: none;
      color: transparent;
      text-shadow: none;
    }

    .tile.movable {
      cursor: pointer;
      background: #ffb347;
      box-shadow: 0 3px 0 #a4511c;
      transform: translateY(1px);
    }

    .tile.movable:hover {
      background: #fff5e0;
      color: #c25d00;
      transform: scale(0.96) translateY(2px);
      box-shadow: 0 1px 0 #9b4a1a;
    }

    /* condensed info panel */
    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      margin-bottom: 6px;
      padding: 0 10px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stats {
      background: #1f2c2b;
      padding: 5px 20px;
      border-radius: 50px;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 2px #3d5a55, 0 4px 8px black;
    }

    .moves-box {
      font-size: 1.4rem;
      font-weight: bold;
      background: #00000066;
      padding: 3px 14px;
      border-radius: 2rem;
      color: #d9ffb8;
      font-family: monospace;
    }

    .moves-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #ffda9e;
      margin-right: 8px;
      text-transform: uppercase;
    }

    .game-status {
      font-size: 1.2rem;
      font-weight: 800;
      background: #000000aa;
      padding: 4px 18px;
      border-radius: 40px;
      backdrop-filter: blur(6px);
      color: #ffeb99;
      letter-spacing: 0.5px;
    }

    button {
      background: #f5b642;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      padding: 6px 20px;
      border-radius: 36px;
      font-family: inherit;
      cursor: pointer;
      color: #2d2418;
      transition: all 0.1s;
      box-shadow: 0 4px 0 #8b4513;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #8b4513;
    }

    .hint {
      text-align: center;
      margin-top: 16px;
      color: #e7cca5;
      font-weight: 500;
      font-size: 0.75rem;
      background: #1e2a26a0;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 4px 14px;
      border-radius: 40px;
    }

    @media (max-width: 480px) {
      .board {
        gap: 4px;
        padding: 4px;
      }
      .puzzle-wrapper {
        padding: 8px;
      }
      .tile {
        border-radius: 12px;
        font-size: 1.8rem;
      }
      .stats {
        padding: 3px 12px;
      }
      .moves-box {
        font-size: 1.2rem;
        padding: 2px 10px;
      }
      .game-status {
        font-size: 1rem;
        padding: 3px 12px;
      }
      button {
        font-size: 0.85rem;
        padding: 5px 14px;
      }
      .hint {
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="puzzle-wrapper">
    <div class="board" id="puzzleBoard"></div>
  </div>

  <div class="info-panel">
    <div class="stats">
      <span class="moves-label">🏆 MOVES</span>
      <span class="moves-box" id="moveCounter">0</span>
    </div>
    <div class="game-status" id="gameStatusMsg">⚡ PLAY</div>
    <button id="newGameBtn">🔄 NEW</button>
  </div>
  <div class="hint">
    ✨ click tile next to empty space → slide · arrange 1..8
  </div>
</div>

<script>
  // ---------- 3x3 sliding puzzle ----------
  const SIZE = 3;
  const SOLVED_STATE = [
    [1, 2, 3],
    [4, 5, 6],
    [7, 8, ""]
  ];

  let board = [];
  let emptyRow = 2;
  let emptyCol = 2;
  let moveCount = 0;
  let gameActive = true;
  let winFlag = false;

  const boardContainer = document.getElementById("puzzleBoard");
  const moveCounterSpan = document.getElementById("moveCounter");
  const gameStatusSpan = document.getElementById("gameStatusMsg");

  function getSolvedBoardCopy() {
    return SOLVED_STATE.map(row => [...row]);
  }

  function updateEmptyCoordinates() {
    for (let i = 0; i < SIZE; i++) {
      for (let j = 0; j < SIZE; j++) {
        if (board[i][j] === "") {
          emptyRow = i;
          emptyCol = j;
          return;
        }
      }
    }
  }

  function isGameWon() {
    for (let i = 0; i < SIZE; i++) {
      for (let j = 0; j < SIZE; j++) {
        if (board[i][j] !== SOLVED_STATE[i][j]) return false;
      }
    }
    return true;
  }

  function handleWin() {
    if (!gameActive) return;
    gameActive = false;
    winFlag = true;
    gameStatusSpan.innerHTML = "🏆 GAME OVER 🎉";
    gameStatusSpan.style.color = "#ffec80";
  }

  function renderBoard() {
    boardContainer.innerHTML = "";
    for (let i = 0; i < SIZE; i++) {
      for (let j = 0; j < SIZE; j++) {
        const value = board[i][j];
        const isEmpty = (value === "");
        const tileDiv = document.createElement("div");
        tileDiv.classList.add("tile");
        if (isEmpty) {
          tileDiv.classList.add("empty");
          tileDiv.textContent = "";
        } else {
          tileDiv.textContent = value;
        }
        tileDiv.setAttribute("data-row", i);
        tileDiv.setAttribute("data-col", j);
        
        if (gameActive && !isEmpty) {
          const isAdjacent = (Math.abs(i - emptyRow) + Math.abs(j - emptyCol)) === 1;
          if (isAdjacent) tileDiv.classList.add("movable");
        }
        boardContainer.appendChild(tileDiv);
      }
    }
    moveCounterSpan.textContent = moveCount;
    if (!winFlag && gameActive) {
      gameStatusSpan.innerHTML = "🎲 PLAYING";
      gameStatusSpan.style.color = "#ffeb99";
    } else if (winFlag && !gameActive) {
      // already set
    }
  }

  function swapWithEmpty(row, col) {
    const isAdjacent = (Math.abs(row - emptyRow) + Math.abs(col - emptyCol)) === 1;
    if (!isAdjacent) return false;
    if (board[row][col] === "") return false;
    
    const temp = board[row][col];
    board[row][col] = board[emptyRow][emptyCol];
    board[emptyRow][emptyCol] = temp;
    emptyRow = row;
    emptyCol = col;
    return true;
  }

  function attemptMove(row, col) {
    if (!gameActive) return false;
    if (board[row][col] === "") return false;
    const isAdjacent = (Math.abs(row - emptyRow) + Math.abs(col - emptyCol)) === 1;
    if (!isAdjacent) return false;
    
    if (swapWithEmpty(row, col)) {
      moveCount++;
      renderBoard();
      if (isGameWon()) {
        handleWin();
        renderBoard();
      }
      return true;
    }
    return false;
  }

  // random valid move for shuffling (does not increase move counter)
  function performRandomMove() {
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    const neighbors = [];
    for (const [dr, dc] of dirs) {
      const nr = emptyRow + dr, nc = emptyCol + dc;
      if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] !== "") {
        neighbors.push([nr, nc]);
      }
    }
    if (neighbors.length === 0) return false;
    const [randRow, randCol] = neighbors[Math.floor(Math.random() * neighbors.length)];
    const temp = board[randRow][randCol];
    board[randRow][randCol] = board[emptyRow][emptyCol];
    board[emptyRow][emptyCol] = temp;
    emptyRow = randRow;
    emptyCol = randCol;
    return true;
  }

  function shuffleBoardFromSolved(moves = 180) {
    board = getSolvedBoardCopy();
    updateEmptyCoordinates(); // empty at (2,2)
    for (let i = 0; i < moves; i++) {
      performRandomMove();
    }
    gameActive = true;
    winFlag = false;
    moveCount = 0;
    gameStatusSpan.innerHTML = "🎲 PLAYING";
    gameStatusSpan.style.color = "#ffeb99";
    renderBoard();
  }

  function newGame() {
    shuffleBoardFromSolved(200);
  }

  // click handler (delegation)
  function handleTileClick(e) {
    const target = e.target.closest(".tile");
    if (!target) return;
    if (!gameActive) return;
    const row = parseInt(target.getAttribute("data-row"));
    const col = parseInt(target.getAttribute("data-col"));
    if (isNaN(row) || isNaN(col)) return;
    if (board[row][col] === "") return;   // clicking empty does nothing
    attemptMove(row, col);
  }

  boardContainer.addEventListener("click", handleTileClick);
  document.getElementById("newGameBtn").addEventListener("click", () => newGame());

  // start game
  shuffleBoardFromSolved(190);
</script>
</body>
</html>
