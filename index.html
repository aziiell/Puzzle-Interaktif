<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sliding Puzzle — Classic 3x3 Tile Game</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none; /* prevent accidental text selection while clicking */
    }

    body {
      background: linear-gradient(145deg, #1a2a2f 0%, #0e1a1f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Fira Sans', 'Poppins', 'Freesans', system-ui, sans-serif;
      margin: 0;
      padding: 24px;
    }

    /* main game card */
    .game-container {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
      border-radius: 64px;
      padding: 30px 30px 40px;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
    }

    .puzzle-wrapper {
      background-color: #8b3c2c;  /* rich terracotta / brick red — similar to pygame rect (165,42,42) */
      border-radius: 48px;
      padding: 24px;
      box-shadow: inset 0 0 0 2px #e2b87a, 0 20px 30px rgba(0, 0, 0, 0.3);
    }

    /* grid layout — 3x3 with dynamic squares */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      background-color: #7a2e1f;
      border-radius: 32px;
      padding: 12px;
    }

    /* tile styling */
    .tile {
      aspect-ratio: 1 / 1;
      background: #ffa559;     /* vivid orange base (255,165,0) like original */
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 10vw, 5rem);
      font-weight: 800;
      color: #2d1b0c;
      font-family: 'Fira Sans', 'Segoe UI', monospace;
      transition: all 0.18s ease;
      cursor: default;
      box-shadow: 0 8px 0 #a4511c;
      transform: translateY(-2px);
      text-shadow: 2px 2px 0 rgba(255,215,150,0.8);
      letter-spacing: 2px;
    }

    /* empty tile (blank) */
    .tile.empty {
      background: #c7bc9c;
      box-shadow: inset 0 0 0 3px #e7ddbc, 0 4px 10px rgba(0,0,0,0.1);
      transform: none;
      color: transparent;
      text-shadow: none;
    }

    /* movable tile (adjacent to empty) -> interactive + hover glow */
    .tile.movable {
      cursor: pointer;
      background: #ffb347;
      box-shadow: 0 4px 0 #a4511c;
      transform: translateY(2px);
    }

    .tile.movable:hover {
      background: #fff5e0;
      color: #c25d00;
      transform: scale(0.97) translateY(3px);
      box-shadow: 0 2px 0 #9b4a1a;
      text-shadow: none;
    }

    /* normal tile hover effect (just for ambiance) */
    .tile:not(.empty):not(.movable):hover {
      background: #ffbc6e;
      transform: scale(0.98);
    }

    /* info panel */
    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 28px;
      margin-bottom: 12px;
      padding: 0 18px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .stats {
      background: #1f2c2b;
      padding: 10px 28px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 3px #3d5a55, 0 5px 12px black;
    }

    .moves-box {
      font-size: 1.8rem;
      font-weight: bold;
      background: #00000066;
      padding: 6px 20px;
      border-radius: 3rem;
      color: #d9ffb8;
      letter-spacing: 1px;
      font-family: monospace;
    }

    .moves-label {
      font-size: 1rem;
      font-weight: 500;
      color: #ffda9e;
      margin-right: 12px;
      text-transform: uppercase;
    }

    .game-status {
      font-size: 1.7rem;
      font-weight: 800;
      background: #000000aa;
      padding: 6px 24px;
      border-radius: 40px;
      backdrop-filter: blur(6px);
      color: #ffeb99;
      text-shadow: 0 2px 5px #d49b00;
      letter-spacing: 1px;
    }

    button {
      background: #f5b642;
      border: none;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 10px 32px;
      border-radius: 40px;
      font-family: inherit;
      cursor: pointer;
      color: #2d2418;
      transition: all 0.15s;
      box-shadow: 0 6px 0 #8b4513;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #8b4513;
    }

    /* footer hint */
    .hint {
      text-align: center;
      margin-top: 20px;
      color: #e7cca5;
      font-weight: 500;
      font-size: 0.9rem;
      background: #1e2a26a0;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 6px 18px;
      border-radius: 60px;
      backdrop-filter: blur(2px);
    }

    @media (max-width: 550px) {
      .board {
        gap: 8px;
        padding: 8px;
      }
      .puzzle-wrapper {
        padding: 16px;
      }
      .tile {
        border-radius: 18px;
        font-size: 2.2rem;
      }
      .stats {
        padding: 5px 18px;
      }
      .moves-box {
        font-size: 1.3rem;
        padding: 3px 14px;
      }
      .game-status {
        font-size: 1.2rem;
        padding: 4px 16px;
      }
      button {
        font-size: 1rem;
        padding: 6px 20px;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="puzzle-wrapper">
    <div class="board" id="puzzleBoard"></div>
  </div>

  <div class="info-panel">
    <div class="stats">
      <span class="moves-label">🏆 MOVES</span>
      <span class="moves-box" id="moveCounter">0</span>
    </div>
    <div class="game-status" id="gameStatusMsg">⚡ PLAY</div>
    <button id="newGameBtn">🔄 NEW GAME</button>
  </div>
  <div class="hint">
    ✨ Click on any tile <strong>adjacent to the empty space</strong> to slide it.<br>
    Arrange numbers 1 to 8 in order → empty at bottom right.
  </div>
</div>

<script>
  // ---------- GAME CONFIGURATION ----------
  const SIZE = 3;             // 3x3 puzzle
  // Solved state: 1 2 3 / 4 5 6 / 7 8 '' (empty string = blank)
  const SOLVED_STATE = [
    [1, 2, 3],
    [4, 5, 6],
    [7, 8, ""]
  ];

  // Game state variables
  let board = [];          // 2D array holding numbers 1..8 or "" (empty)
  let emptyRow = 2;        // row index of empty cell
  let emptyCol = 2;        // col index of empty cell
  let moveCount = 0;
  let gameActive = true;    // if false, game over (win) -> no moves allowed until new game
  let winFlag = false;

  // DOM elements
  const boardContainer = document.getElementById("puzzleBoard");
  const moveCounterSpan = document.getElementById("moveCounter");
  const gameStatusSpan = document.getElementById("gameStatusMsg");

  // Helper: deep copy solved state to initialize / reset board
  function getSolvedBoardCopy() {
    return SOLVED_STATE.map(row => [...row]);
  }

  // Update empty coordinates based on current board (scan)
  function updateEmptyCoordinates() {
    for (let i = 0; i < SIZE; i++) {
      for (let j = 0; j < SIZE; j++) {
        if (board[i][j] === "") {
          emptyRow = i;
          emptyCol = j;
          return;
        }
      }
    }
  }

  // Check if the board matches the solved configuration
  function isGameWon() {
    for (let i = 0; i < SIZE; i++) {
      for (let j = 0; j < SIZE; j++) {
        if (board[i][j] !== SOLVED_STATE[i][j]) {
          return false;
        }
      }
    }
    return true;
  }

  // win handler: deactivates game, displays victory message
  function handleWin() {
    if (!gameActive) return;
    gameActive = false;
    winFlag = true;
    gameStatusSpan.innerHTML = "🏆 GAME OVER 🎉";
    gameStatusSpan.style.color = "#ffec80";
    gameStatusSpan.style.textShadow = "0 0 6px #d48f00";
    // disable any further moves visually (logic already prevented by gameActive)
  }

  // refresh UI: re-render board tiles from current 'board' state
  // Also highlights tiles that are movable (adjacent to empty)
  function renderBoard() {
    boardContainer.innerHTML = "";
    for (let i = 0; i < SIZE; i++) {
      for (let j = 0; j < SIZE; j++) {
        const value = board[i][j];
        const isEmpty = (value === "");
        const tileDiv = document.createElement("div");
        tileDiv.classList.add("tile");
        if (isEmpty) {
          tileDiv.classList.add("empty");
          tileDiv.textContent = "";
        } else {
          tileDiv.textContent = value;
        }
        // set data attributes for event delegation
        tileDiv.setAttribute("data-row", i);
        tileDiv.setAttribute("data-col", j);
        tileDiv.setAttribute("data-value", isEmpty ? "empty" : value);
        
        // movable check: if game active & tile NOT empty & adjacent to empty cell
        if (gameActive && !isEmpty) {
          const isAdjacent = (Math.abs(i - emptyRow) + Math.abs(j - emptyCol)) === 1;
          if (isAdjacent) {
            tileDiv.classList.add("movable");
          }
        }
        boardContainer.appendChild(tileDiv);
      }
    }
    // update move counter & game status if not win (but status remains)
    moveCounterSpan.textContent = moveCount;
    if (!winFlag && gameActive) {
      gameStatusSpan.innerHTML = "🎲 PLAYING";
      gameStatusSpan.style.color = "#ffeb99";
    } else if (winFlag && !gameActive) {
      // already set
    } else if (!gameActive && !winFlag) {
      // fallback (shouldn't happen)
      gameStatusSpan.innerHTML = "⏸️ PAUSED";
    }
  }

  // Perform swap between tile at (row, col) and the empty cell.
  // Precondition: tile must be adjacent to empty.
  // Returns true if swap performed, false otherwise.
  function swapWithEmpty(row, col) {
    // ensure empty is adjacent
    const isAdjacent = (Math.abs(row - emptyRow) + Math.abs(col - emptyCol)) === 1;
    if (!isAdjacent) return false;
    if (board[row][col] === "") return false;   // cannot swap empty with empty
    
    // swap values
    const temp = board[row][col];
    board[row][col] = board[emptyRow][emptyCol];
    board[emptyRow][emptyCol] = temp;
    
    // update empty coordinates to new empty position
    emptyRow = row;
    emptyCol = col;
    return true;
  }

  // Main action: try to move tile at given coordinates (if game active & valid)
  function attemptMove(row, col) {
    if (!gameActive) {
      return false;
    }
    // tile must not be empty
    if (board[row][col] === "") return false;
    
    // check adjacency
    const isAdjacent = (Math.abs(row - emptyRow) + Math.abs(col - emptyCol)) === 1;
    if (!isAdjacent) return false;
    
    // perform swap
    const success = swapWithEmpty(row, col);
    if (success) {
      moveCount++;
      moveCounterSpan.textContent = moveCount;
      renderBoard();    // re-render with new positions & movable highlights
      
      // after move, check win condition
      if (isGameWon()) {
        handleWin();
        renderBoard();  // final render to show win state (no movable tiles)
      }
      return true;
    }
    return false;
  }

  // ---------- SHUFFLE LOGIC (solvable by random valid moves) ----------
  // Perform a single random move from current board state (choose random adjacent tile to empty)
  function performRandomMove() {
    // gather all tiles adjacent to empty cell
    const directions = [
      { dr: -1, dc: 0 }, // up
      { dr: 1, dc: 0 },  // down
      { dr: 0, dc: -1 }, // left
      { dr: 0, dc: 1 }   // right
    ];
    const neighbors = [];
    for (const dir of directions) {
      const newRow = emptyRow + dir.dr;
      const newCol = emptyCol + dir.dc;
      if (newRow >= 0 && newRow < SIZE && newCol >= 0 && newCol < SIZE) {
        if (board[newRow][newCol] !== "") {
          neighbors.push({ row: newRow, col: newCol });
        }
      }
    }
    if (neighbors.length === 0) return false;
    const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
    // swap tile with empty (no move counter increment)
    const temp = board[randomNeighbor.row][randomNeighbor.col];
    board[randomNeighbor.row][randomNeighbor.col] = board[emptyRow][emptyCol];
    board[emptyRow][emptyCol] = temp;
    // update empty coordinates
    emptyRow = randomNeighbor.row;
    emptyCol = randomNeighbor.col;
    return true;
  }

  // Shuffle board using N random valid moves (starting from solved state)
  // This ensures the puzzle is always solvable.
  function shuffleBoardFromSolved(movesCount = 220) {
    // reset board to solved configuration
    board = getSolvedBoardCopy();
    updateEmptyCoordinates();   // should be (2,2) empty at bottom-right
    
    // perform random moves
    for (let i = 0; i < movesCount; i++) {
      performRandomMove();
    }
    // after shuffle, reset game flags and move counter
    gameActive = true;
    winFlag = false;
    moveCount = 0;
    moveCounterSpan.textContent = "0";
    gameStatusSpan.innerHTML = "🎲 PLAYING";
    gameStatusSpan.style.color = "#ffeb99";
    // final render to show shuffled board with correct highlights
    renderBoard();
  }

  // New game: shuffle from solved state again, reset all stats
  function newGame() {
    shuffleBoardFromSolved(240);  // 240 random moves for good mix
    // after shuffle, ensure active and no win flag
    gameActive = true;
    winFlag = false;
    moveCount = 0;
    moveCounterSpan.textContent = "0";
    gameStatusSpan.innerHTML = "🎲 PLAYING";
    renderBoard();
  }

  // ---------- EVENT HANDLER (click delegation) ----------
  function handleTileClick(e) {
    // find actual tile element (might be nested? no, tile div is direct)
    let target = e.target.closest(".tile");
    if (!target) return;
    
    // ignore if game not active (win state)
    if (!gameActive) return;
    
    const row = parseInt(target.getAttribute("data-row"));
    const col = parseInt(target.getAttribute("data-col"));
    if (isNaN(row) || isNaN(col)) return;
    
    // Only attempt move if the clicked tile is NOT empty (value presence)
    const isEmptyTile = board[row][col] === "";
    if (isEmptyTile) return;   // clicking on empty cell does nothing
    
    // attempt move (adjacency & logic inside)
    attemptMove(row, col);
  }

  // attach event listener via delegation
  boardContainer.addEventListener("click", handleTileClick);

  // new game button listener
  const newGameBtn = document.getElementById("newGameBtn");
  newGameBtn.addEventListener("click", () => {
    newGame();
  });

  // ---------- INITIAL GAME START ----------
  // generate a fully random but solvable puzzle (from solved + random moves)
  function initGame() {
    board = getSolvedBoardCopy();
    updateEmptyCoordinates();   // empty at (2,2)
    shuffleBoardFromSolved(200);  // 200 random moves => dynamic & fair
  }

  initGame();
</script>
</body>
</html>
